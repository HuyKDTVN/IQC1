<body>
<div class="header">

</div>
<div id="ket-qua">
    ...
</div>
<div class="input-group mb-3">
  <div class="input-group-prepend">
    <span class="input-group-text" id="basic-addon1">DS</span>
  </div>
  <input id="barcodeDS" type="text" readonly class="form-control" placeholder="Chạm để quét barcode tờ DS" aria-label="DS" aria-describedby="basic-addon1">
</div>

<div class="input-group mb-3">
  <div class="input-group-prepend">
    <span class="input-group-text" id="basic-addon2">Chỉ thị</span>
  </div>
  <input id="barcodeChiThi" type="text" readonly class="form-control" placeholder="Chạm để quét barcode tờ chỉ thị" aria-label="DS" aria-describedby="basic-addon1">
</div>

<div class="input-group mb-3">
  <div class="input-group-prepend">
    <span class="input-group-text" id="basic-addon3">Casemark</span>
  </div>
  <input id="barcodeCasemark"  type="text" readonly class="form-control" placeholder="Chạm để quét barcode tờ Casemark" aria-label="DS" aria-describedby="basic-addon1">
</div>
<!-- readonly -->
<!--
vi du to DS: 142124225400010+001 000000220000302RV08021 01 000000022000KCR10514 005/010
Vi du to chi thi: 302RV08021-01-250000068-400-20-130544763230C0
to Casemark: e 
 -->
<div id="reader"></div>
<div id="reader2"></div>
<div id="reader3"></div>
<div class="d-flex justify-content-center mt-3">
    <button class="btn btn-lg btn-outline-dark" id="buttonConfirm">
        Xác nhận
    </button>
</div>
<script>
</script>
<script src="app.js"></script>
</body>
</html>
