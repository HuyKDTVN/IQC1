1. Class A

Dải địa chỉ: 1.0.0.0 → 126.255.255.255
Bit đầu tiên: 0
Subnet mask mặc định: 255.0.0.0 (/8)
Số mạng: 128 mạng
Số host mỗi mạng: ~ 16 triệu

👉 Ứng dụng: mạng cực lớn (trước đây cấp cho tập đoàn lớn, ISP, chính phủ).

✅ 2. Class B

Dải địa chỉ: 128.0.0.0 → 191.255.255.255
Bit đầu: 10
Subnet mask mặc định: 255.255.0.0 (/16)
Số mạng: ~ 16.384
Số host mỗi mạng: ~ 65.000

👉 Ứng dụng: mạng trung bình (trường đại học, doanh nghiệp lớn).

✅ 3. Class C

Dải địa chỉ: 192.0.0.0 → 223.255.255.255
Bit đầu: 110
Subnet mask mặc định: 255.255.255.0 (/24)
Số mạng: ~ 2 triệu
Số host mỗi mạng: 254

👉 Ứng dụng: mạng nhỏ, phổ biến nhất trong LAN.

✅ 4. Class D (Multicast)

Dải địa chỉ: 224.0.0.0 → 239.255.255.255
Bit đầu: 1110
Không có subnet mask
👉 Ứng dụng: Multicast (IPTV, streaming, video conference, routing protocols…).


✅ 5. Class E (Nghiên cứu)

Dải địa chỉ: 240.0.0.0 → 255.255.255.255
Bit đầu: 1111
👉 Ứng dụng: dự trữ, nghiên cứu – không dùng trong mạng thông thường.
